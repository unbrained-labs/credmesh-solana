[toolchain]

[features]
resolution = true
skip-lint = false

[programs.devnet]
credmesh_escrow = "DLy82HRrSnSVZfQTxze8CEZwequnGyBcJNvYZX1L9yuF"
credmesh_attestor_registry = "ALVf6iyB6P5RFizRtxorJ3pAcc4731VziAn67sW6brvk"

[programs.localnet]
credmesh_escrow = "DLy82HRrSnSVZfQTxze8CEZwequnGyBcJNvYZX1L9yuF"
credmesh_attestor_registry = "ALVf6iyB6P5RFizRtxorJ3pAcc4731VziAn67sW6brvk"

[registry]
url = "https://api.apr.dev"

[provider]
cluster = "Devnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "cargo test --workspace --lib"

[test]
startup_wait = 5000
shutdown_wait = 2000
upgradeable = false

[test.validator]
bind_address = "0.0.0.0"
url = "https://api.devnet.solana.com"
ledger = ".anchor/test-ledger"
rpc_port = 8899

# External programs the workspace's devnet/localnet sessions need cloned
# from mainnet. MPL Core / MPL Agent Registry / MPL Agent Tools were
# removed in the EVM-bridge pivot (identity + reputation live on EVM
# now); only Squads v4 (governance multisig) and the Memo program are
# load-bearing for the post-pivot programs. Mainnet USDC is cloned for
# init-pool tests and integration runs.

# Mainnet USDC (Circle).
[[test.validator.clone]]
address = "EPjFWdd5AufqSSqeM2qN1xzybapC8G4wEGGkZwyTDt1v"

# Squads v4 — governance multisig CPI'd by propose_params,
# skim_protocol_fees, and the credmesh-attestor-registry ixs.
[[test.validator.clone]]
address = "SQDS4ep65T869zMMBKyuUq6aD6EgTu8psMjkvj52pCf"

# Memo v2 — settlement-nonce binding in claim_and_settle.
[[test.validator.clone]]
address = "MemoSq4gqABAXKb96qnH8TysNcWxMyWCqXgDLGmfcHr"
