<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-label="CredMesh — calibrated credit instrument">
  <!-- ============================================================
       LOGOMARK / CredMesh Test Set 100-USDC
       Concept: instrument front panel. The plate (paper) holds a
       readout window (ink) showing a utilization trace, a scale of
       calibration tics below it, and a single red needle at the
       current reading (67%). Power LED top-left, fiducials at two
       corners, label strip at the foot. No circles as primary forms.
       ============================================================ -->

  <!-- plate -->
  <rect x="8" y="8" width="184" height="184" fill="#F2EFEA" stroke="#0C0E10" stroke-width="6"/>
  <!-- inner hairline bezel -->
  <rect x="14" y="14" width="172" height="172" fill="none" stroke="#0C0E10" stroke-width="0.75"/>

  <!-- power indicator -->
  <rect x="22" y="22" width="10" height="10" fill="#1F5C66"/>

  <!-- corner fiducials -->
  <g stroke="#1F5C66" stroke-width="1.5">
    <line x1="166" y1="24" x2="178" y2="24"/>
    <line x1="172" y1="18" x2="172" y2="30"/>
    <line x1="22" y1="176" x2="34" y2="176"/>
    <line x1="28" y1="170" x2="28" y2="182"/>
  </g>

  <!-- readout window (the screen) -->
  <rect x="28" y="46" width="144" height="76" fill="#0C0E10"/>

  <!-- graticule -->
  <g stroke="#1F5C66" stroke-width="0.75" stroke-opacity="0.6">
    <line x1="64" y1="46" x2="64" y2="122"/>
    <line x1="100" y1="46" x2="100" y2="122"/>
    <line x1="136" y1="46" x2="136" y2="122"/>
    <line x1="28" y1="84" x2="172" y2="84"/>
  </g>

  <!-- utilization trace -->
  <path d="M 28,108 L 56,108 L 56,92 L 86,92 L 86,76 L 116,76 L 116,64 L 148,64 L 148,58 L 172,58"
        fill="none" stroke="#F2EFEA" stroke-width="2.5"
        stroke-linecap="square" stroke-linejoin="miter"/>

  <!-- scale baseline -->
  <line x1="28" y1="134" x2="172" y2="134" stroke="#0C0E10" stroke-width="1"/>

  <!-- 11 calibration tics -->
  <g stroke="#0C0E10" stroke-width="1">
    <line x1="28"     y1="134" x2="28"     y2="140"/>
    <line x1="42.4"   y1="134" x2="42.4"   y2="140"/>
    <line x1="56.8"   y1="134" x2="56.8"   y2="140"/>
    <line x1="71.2"   y1="134" x2="71.2"   y2="140"/>
    <line x1="85.6"   y1="134" x2="85.6"   y2="140"/>
    <line x1="100"    y1="134" x2="100"    y2="142"/>
    <line x1="114.4"  y1="134" x2="114.4"  y2="140"/>
    <line x1="128.8"  y1="134" x2="128.8"  y2="140"/>
    <line x1="143.2"  y1="134" x2="143.2"  y2="140"/>
    <line x1="157.6"  y1="134" x2="157.6"  y2="140"/>
    <line x1="172"    y1="134" x2="172"    y2="142"/>
  </g>

  <!-- needle: the current reading at 67% of full-scale -->
  <polygon points="124.48,124 120,116 128.96,116" fill="#C62828"/>
  <line x1="124.48" y1="124" x2="124.48" y2="150"
        stroke="#C62828" stroke-width="2.5"/>

  <!-- foot label strip (for product line / serial mark) -->
  <rect x="28" y="160" width="144" height="14" fill="#1F5C66"/>
  <!-- stencil-cut "CM" inside the strip, hand-drawn as paths so the
       logo is font-independent -->
  <g fill="#F2EFEA">
    <!-- C (stenciled, hand-drawn paths so logo is font-independent) -->
    <rect x="39" y="163.5" width="2"  height="7"/>
    <rect x="39" y="163.5" width="8"  height="2"/>
    <rect x="39" y="168.5" width="8"  height="2"/>
    <!-- M -->
    <rect x="51" y="163.5" width="2"  height="7"/>
    <rect x="61" y="163.5" width="2"  height="7"/>
    <rect x="51" y="163.5" width="12" height="2"/>
    <rect x="56" y="165.5" width="2"  height="3"/>
  </g>

  <!-- right-side label inside strip: tiny rev mark -->
  <g fill="#F2EFEA">
    <rect x="148" y="166" width="1.5" height="4"/>
    <rect x="151" y="166" width="1.5" height="4"/>
    <rect x="148" y="166" width="4.5" height="1.5"/>
    <rect x="148" y="168.5" width="4.5" height="1.5"/>
    <rect x="155" y="166" width="1.5" height="4"/>
    <rect x="155" y="166" width="4" height="1.5"/>
    <rect x="155" y="167.5" width="4" height="1.5"/>
    <rect x="155" y="168.5" width="4" height="1.5"/>
  </g>
</svg>
